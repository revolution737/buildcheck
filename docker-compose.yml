version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: buildcheck-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: buildcheck-api
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/buildcheck
      - JWT_SECRET=your_super_secret_key_min_32_chars
      - JWT_EXPIRY=7d
      - PORT=3000
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
